<div class="flex items-center justify-center h-screen bg-gradient-to-br from-gray-50 to-gray-200 select-none">
    <div class="bg-white p-8 rounded-2xl shadow-md w-full max-w-md">
        <img src="assets/img/casaBonitaTransparenteN.png" alt="Casa Bonita Residencial" class="mx-auto w-36 mb-6" />
        <h2 class="text-2xl font-bold text-gray-800 text-center mb-4">
            {{ 'login.h2WelcomeTo' | translate }}
            
        </h2>
        <app-lang-switcher></app-lang-switcher>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <!-- Usuario -->
            <div>
                <label for="username" class="block text-gray-700 font-semibold mb-1">
                    {{'login.username' | translate }}
                </label>
                <input id="username" formControlName="username" type="text" placeholder="{{'login.placeHolderUser' | translate }}"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 transition" />
                <p *ngIf="loginForm.get('username')?.invalid && loginForm.touched" class="text-red-500 text-sm mt-1">
                    {{'login.userEmpty' | translate }}
                </p>
            </div>

            <!-- Contraseña con toggle -->
            <div class="relative">
                <label for="password" class="block text-gray-700 font-semibold mb-1">
                    {{'login.password' | translate }}
                </label>
                <input id="password" formControlName="password" [type]="showPassword ? 'text' : 'password'"
                    placeholder="••••••••"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-500 transition" />
                <button type="button" (click)="showPassword = !showPassword"
                class="absolute top-1/2 right-3 transform -translate-y-1/2 flex items-center text-gray-500"  >                  <!-- Icono ojo abierto/cerrado -->
                    <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                        <path
                            d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.27 2.943 9.542 7-1.272 4.057-5.064 7-9.542 7S3.732 16.057 2.458 12z" />
                    </svg>
                    <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path d="M3 3l18 18" />
                    </svg>
                </button>
                <p *ngIf="loginForm.get('password')?.invalid && loginForm.touched" class="text-red-500 text-sm mt-1">
                    {{'login.passwordEmpty' | translate }}
                </p>
            </div>

            <!-- Recuérdame -->
            <div class="flex items-center space-x-2">
                <input type="checkbox" formControlName="remember" id="remember"
                    class="h-4 w-4 text-yellow-500 focus:ring-yellow-400 border-gray-300 rounded" />
                <label for="remember" class="text-gray-600 text-sm">{{'login.remember'| translate}}</label>
            </div>

            <!-- Botón con spinner -->
            <button type="submit" [disabled]="loginForm.invalid || loading"
                class="w-full py-2 bg-yellow-500 text-white font-semibold rounded-lg hover:bg-yellow-600 disabled:opacity-50 flex justify-center items-center transition">
                <svg *ngIf="loading" class="animate-spin h-5 w-5 mr-2 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                </svg>
                <ng-container *ngIf="loading; else submitText">
                  {{ 'login.charging' | translate }}
                </ng-container>
                <ng-template #submitText>
                  {{ 'login.submit' | translate }}
                </ng-template>
            </button>

            <p *ngIf="errorMsg" class="text-red-500 text-center text-sm mt-2">
                {{ errorMsg }}
            </p>
        </form>

        <div class="mt-4 text-center">
            <a routerLink="/reset-password" class="text-gray-600 hover:underline text-sm">
                {{'login.forgotPassword' | translate }}
            </a>
        </div>

        <p class="mt-8 text-center text-xs text-gray-400">
            v1.0.0 &copy; Casa Bonita Residencial
        </p>
    </div>
</div>
