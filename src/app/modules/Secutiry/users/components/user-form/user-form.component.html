<div class="p-4 space-y-4 bg-gray-900 text-white rounded-xl w-full max-w-xl">
    <h3 class="text-lg font-semibold">Create User</h3>
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div>
            <label class="block text-sm mb-1">Name</label>
            <input type="text" formControlName="name"
                class="w-full px-3 py-2 rounded bg-gray-800 border border-gray-700">
        </div>

        <div>
            <label class="block text-sm mb-1">Email</label>
            <input type="email" formControlName="email"
                class="w-full px-3 py-2 rounded bg-gray-800 border border-gray-700">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div>
                <label class="block text-sm mb-1">Password</label>
                <input type="password" formControlName="password"
                    class="w-full px-3 py-2 rounded bg-gray-800 border border-gray-700">
            </div>
            <div>
                <label class="block text-sm mb-1">Confirm Password</label>
                <input type="password" formControlName="confirmPassword"
                    class="w-full px-3 py-2 rounded bg-gray-800 border border-gray-700">
            </div>
        </div>

        <div>
            <label class="block text-sm mb-1">Status</label>
            <select formControlName="status" class="w-full px-3 py-2 rounded bg-gray-800 border border-gray-700">
                <option value="active">Active</option>
                <option value="blocked">Blocked</option>
            </select>
        </div>

        <div>
            <label class="block text-sm mb-1">Roles</label>
            <div class="space-y-1">
                <label *ngFor="let role of roles" class="flex items-center gap-2">
                    <input type="checkbox" [value]="role" (change)="onRoleChange($event)"
                        [checked]="form.value.roles.includes(role)">
                    {{ role | titlecase }}
                </label>
            </div>
        </div>

        <div class="flex justify-end gap-2 pt-4">
            <button type="button" class="px-4 py-2 rounded bg-gray-700 hover:bg-gray-600"
                (click)="cancelForm()">Cancel</button>
            <button type="submit" class="px-4 py-2 rounded bg-blue-600 hover:bg-blue-500"
                [disabled]="form.invalid">Create</button>
        </div>
    </form>
    </div>
