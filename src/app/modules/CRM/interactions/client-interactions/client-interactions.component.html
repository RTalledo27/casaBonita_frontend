<div class="min-h-[100svh] w-full px-6 lg:px-10 pt-10 md:pt-14 xl:pt-16 pb-12
     bg-gradient-to-br from-slate-50 via-blue-50/30 to-indigo-50/20
     dark:from-gray-900 dark:via-slate-900/80 dark:to-indigo-950/30
     relative overflow-hidden text-gray-800 dark:text-white">

  <!-- Blobs decorativos -->
  <div class="pointer-events-none absolute inset-0 overflow-hidden">
    <div class="absolute -top-36 -right-36 w-80 h-80 rounded-full blur-3xl bg-gradient-to-br from-cyan-400/20 to-blue-600/20 animate-pulse"></div>
    <div class="absolute -bottom-40 -left-40 w-96 h-96 rounded-full blur-3xl bg-gradient-to-tr from-indigo-400/15 to-purple-400/15 animate-pulse delay-1000"></div>
  </div>

  <!-- Header -->
  <div class="relative bg-white/70 dark:bg-gray-800/70 backdrop-blur-2xl p-6 lg:p-8 rounded-3xl shadow-2xl
              border border-white/20 dark:border-gray-700/50 mb-8 overflow-hidden group">
    <div class="absolute inset-0 bg-gradient-to-r from-cyan-500/5 via-blue-500/5 to-indigo-500/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"></div>

    <div class="relative flex flex-col md:flex-row md:items-center md:justify-between gap-5">
      <div class="flex items-start gap-4">
        <div class="p-3 rounded-2xl bg-gradient-to-br from-cyan-500 to-blue-600 shadow-lg shadow-cyan-500/20">
          <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
        </div>
        <div>
          <h2 class="text-3xl md:text-4xl font-black bg-gradient-to-r from-gray-900 via-blue-800 to-indigo-800
                      dark:from-white dark:via-blue-200 dark:to-indigo-200 bg-clip-text text-transparent tracking-tight">
            {{ 'crm.interactions.view' | translate }}
          </h2>
          <p class="text-gray-600 dark:text-gray-300 mt-1 font-medium">
            {{ (interactions$ | async)?.length || 0 }} registros
          </p>
        </div>
      </div>

      <button (click)="onCreate()"
              class="group inline-flex items-center gap-3 px-6 py-3 rounded-2xl font-semibold text-white
                     bg-gradient-to-r from-cyan-600 via-blue-600 to-indigo-600
                     hover:from-cyan-700 hover:via-blue-700 hover:to-indigo-700
                     shadow-xl hover:shadow-2xl hover:-translate-y-0.5 transition-all duration-300">
        <lucide-icon [name]="plus" class="w-4 h-4 group-hover:rotate-90 transition-transform duration-300"></lucide-icon>
        {{ 'common.new' | translate }}
      </button>
    </div>
  </div>

  <!-- Tabla -->
  <div class="relative bg-white/80 dark:bg-gray-800/80 backdrop-blur-2xl rounded-3xl shadow-2xl
              border border-white/30 dark:border-gray-700/50 overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-cyan-500 via-blue-500 to-indigo-500"></div>
    <div class="p-4 lg:p-6">
      <app-shared-table [columns]="columns" [data]="(interactions$|async)||[]"></app-shared-table>
    </div>
  </div>
</div>

<!-- Modal superpuesto (glass) -->
<div *ngIf="isModalOpen"
     class="fixed inset-0 z-[60] flex items-center justify-center bg-black/50 backdrop-blur-sm p-4">
  <div class="relative w-full max-w-xl max-h-[90vh] overflow-y-auto
              bg-white/95 dark:bg-gray-900/95 border border-white/10 dark:border-gray-700/30
              rounded-3xl shadow-xl">
    <div class="p-6 md:p-8">
      <router-outlet name="modal" (activate)="onModalActivate()" (deactivate)="onModalDeactivate()"></router-outlet>
    </div>
  </div>
</div>
