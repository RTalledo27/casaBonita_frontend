<div class="w-full p-6 md:p-8 text-gray-900 dark:text-white">
    <h3 class="text-2xl font-black bg-gradient-to-r from-gray-900 via-blue-800 to-indigo-800
                dark:from-white dark:via-blue-200 dark:to-indigo-200 bg-clip-text text-transparent tracking-tight mb-6">
      {{ isEditMode ? 'Edit' : 'New' }} Interaction
    </h3>
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Date</label>
            <input type="date" class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all duration-200" formControlName="date" />
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Channel</label>
            <select class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 appearance-none transition-all duration-200" formControlName="channel">
                <option *ngFor="let c of channels" [value]="c">{{ c }}</option>
            </select>
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Notes</label>
            <textarea class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200 min-h-[100px] resize-y" formControlName="notes"></textarea>
        </div>
        <div class="flex justify-end gap-3 pt-4">
            <button type="button"
                    class="inline-flex items-center gap-2 px-5 py-2.5 rounded-xl font-semibold
                           bg-white/80 dark:bg-gray-700/80 text-gray-700 dark:text-gray-100
                           border border-gray-200/50 dark:border-gray-600/50 hover:bg-white dark:hover:bg-gray-600
                           shadow-lg hover:shadow-xl transition-all duration-300"
                    (click)="close()">
                <lucide-icon [name]="X" class="w-4 h-4"></lucide-icon>
                Cancel
            </button>
            <button type="submit"
                    class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white
                           bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700
                           shadow-md shadow-blue-500/20 hover:shadow-lg transition-all duration-200 disabled:opacity-40"
                    [disabled]="form.invalid">
              {{ isEditMode ? '✓ Update' : '✓ Create' }}
            </button>
        </div>
    </form>
</div>
