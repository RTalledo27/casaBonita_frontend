<div class="w-full p-6 md:p-8 text-gray-900 dark:text-white">
    <!-- Header -->
    <div class="flex justify-between items-start mb-8">
        <div class="flex-1">
            <h3 class="text-2xl md:text-3xl font-black bg-gradient-to-r from-gray-900 via-blue-800 to-indigo-800
                        dark:from-white dark:via-blue-200 dark:to-indigo-200 bg-clip-text text-transparent tracking-tight">
              {{ isEditMode ? 'Editar Cliente' : 'Crear Cliente' }}
            </h3>
            <div class="mt-4">
              <div class="flex justify-between items-center mb-2">
                <span class="text-xs font-semibold text-gray-600 dark:text-gray-400">Paso {{ currentStep }} de {{ sections.length }}</span>
                <span class="text-xs font-semibold text-blue-600 dark:text-blue-400">{{ ((currentStep / sections.length) * 100) | number:'1.0-0' }}%</span>
              </div>
              <div class="bg-gray-100 dark:bg-gray-800 rounded-full h-2 overflow-hidden">
                <div class="bg-gradient-to-r from-blue-500 via-indigo-500 to-purple-500 h-2 rounded-full transition-all duration-500 ease-out" [style.width.%]="(currentStep / sections.length) * 100"></div>
              </div>
            </div>
        </div>
        <button type="button"
            class="flex items-center gap-2 px-4 py-2.5 text-gray-600 dark:text-gray-400 hover:text-gray-900 dark:hover:text-white
                   hover:bg-gray-100 dark:hover:bg-gray-800 rounded-xl transition-all duration-200 ml-4"
            (click)="onCancel()">
            <lucide-icon [name]="X" class="w-5 h-5"></lucide-icon> <span class="font-medium">Cancelar</span>
        </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
        <div *ngFor="let s of sections; let i = index"
            [ngClass]="s.expanded ? 'ring-1 ring-blue-500/20 shadow-lg' : 'hover:shadow-md'"
            class="bg-white/80 dark:bg-gray-800/80 backdrop-blur-sm rounded-2xl border border-gray-200/50 dark:border-gray-700/50 overflow-hidden transition-all duration-300">
            <button type="button"
                class="w-full flex justify-between items-center px-6 py-4 select-none transition-all duration-300"
                [ngClass]="s.expanded ? 'bg-gradient-to-r from-blue-50/80 to-indigo-50/50 dark:from-gray-800/80 dark:to-gray-800/60' : 'hover:bg-gray-50/80 dark:hover:bg-gray-700/50'"
                (click)="toggleSection(i)">
                <div class="flex items-center gap-3">
                    <span
                        class="h-9 w-9 flex items-center justify-center rounded-xl text-sm font-bold transition-all duration-300"
                        [ngClass]="s.expanded ? 'bg-gradient-to-br from-blue-500 to-indigo-600 text-white shadow-md shadow-blue-500/20' : 'bg-gray-100 dark:bg-gray-700 text-gray-600 dark:text-gray-400'">
                        {{ i + 1 }}
                    </span>
                    <lucide-icon [name]="s.icon" class="w-5 h-5 transition-all duration-300"
                        [ngClass]="s.expanded ? 'text-blue-600 dark:text-blue-400' : 'text-gray-500 dark:text-gray-400'"></lucide-icon>
                    <span class="font-semibold text-base transition-all duration-300" [ngClass]="s.expanded ? 'text-gray-900 dark:text-white' : 'text-gray-700 dark:text-gray-300'">{{ s.title | titlecase }}</span>
                </div>
                <lucide-icon [name]="s.expanded ? ChevronUp : ChevronDown" class="w-5 h-5 transition-all duration-300" [ngClass]="s.expanded ? 'text-blue-600 dark:text-blue-400' : 'text-gray-400 dark:text-gray-500'"></lucide-icon>
            </button>

            <div *ngIf="s.expanded" class="p-6 bg-gray-50/50 dark:bg-gray-900/30 space-y-6 border-t border-gray-200/50 dark:border-gray-700/50">
                <ng-container *ngIf="s.key === 'general'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">First Name</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="first_name" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Last Name</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="last_name" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Doc Type</label>
                            <select class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 appearance-none transition-all duration-200" formControlName="doc_type">
                                <option value="" disabled>Select...</option>
                                <option *ngFor="let d of docTypes" [value]="d">{{ d }}</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Doc Number</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="doc_number" />
                            <div class="text-xs mt-1.5 font-medium" [class]="fc('doc_number').invalid && fc('doc_number').touched ? 'text-red-500' : 'sr-only'">
                              {{ form.value.doc_type === 'DNI' ? 'Debe tener 8 dígitos numéricos' : 'Número requerido' }}
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Marital Status</label>
                            <select class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 appearance-none transition-all duration-200" formControlName="marital_status">
                                <option value="" disabled>Select...</option>
                                <option *ngFor="let m of maritalStatuses" [value]="m">{{ m | titlecase }}</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Type</label>
                            <select class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 appearance-none transition-all duration-200" formControlName="type">
                                <option value="" disabled>Select...</option>
                                <option *ngFor="let t of clientTypes" [value]="t">{{ t }}</option>
                            </select>
                        </div>
                    </div>
                </ng-container>

                <ng-container *ngIf="s.key === 'contact'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Email</label>
                            <div class="flex items-center gap-2">
                              <input class="flex-1 border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="email" />
                              <button type="button" (click)="requestEmailVerification()" [disabled]="!fc('email').valid || emailVerified"
                                      class="px-4 py-2.5 rounded-xl text-sm font-semibold text-white shadow-md transition-all duration-200 disabled:opacity-50"
                                      [ngClass]="emailVerified ? 'bg-gradient-to-r from-emerald-500 to-teal-600' : 'bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700'">
                                {{ emailVerified ? '✓ Verified' : 'Verify' }}
                              </button>
                            </div>
                            <div *ngIf="emailVerificationId && !emailVerified" class="mt-3 flex gap-2 items-center">
                              <input type="text" [(ngModel)]="codeEmail" [ngModelOptions]="{standalone: true}" name="codeEmail" maxlength="6"
                                     class="flex-1 border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200"
                                     placeholder="Verification code" />
                              <button type="button" (click)="confirmEmailVerification()" [disabled]="!codeEmail || isVerifyingEmail"
                                      class="px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-emerald-500 to-teal-600 shadow-md disabled:opacity-50 transition-all duration-200">
                                Confirm
                              </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Phone</label>
                            <div class="flex items-center gap-2">
                              <input class="flex-1 border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="primary_phone" />
                              <button type="button" (click)="requestPhoneVerification()" [disabled]="!fc('primary_phone').value || phoneVerified"
                                      class="px-4 py-2.5 rounded-xl text-sm font-semibold text-white shadow-md transition-all duration-200 disabled:opacity-50"
                                      [ngClass]="phoneVerified ? 'bg-gradient-to-r from-emerald-500 to-teal-600' : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700'">
                                {{ phoneVerified ? '✓ Verified' : 'Verify' }}
                              </button>
                            </div>
                            <div class="text-xs mt-1.5 font-medium" [class]="fc('primary_phone').invalid && fc('primary_phone').touched ? 'text-red-500' : 'sr-only'">
                              Debe tener 9 dígitos numéricos
                            </div>
                            <div *ngIf="phoneVerificationId && !phoneVerified" class="mt-3 flex gap-2 items-center">
                              <input type="text" [(ngModel)]="codePhone" [ngModelOptions]="{standalone: true}" name="codePhone" maxlength="6"
                                     class="flex-1 border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200"
                                     placeholder="Verification code" />
                              <button type="button" (click)="confirmPhoneVerification()" [disabled]="!codePhone || isVerifyingPhone"
                                      class="px-4 py-2.5 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-emerald-500 to-teal-600 shadow-md disabled:opacity-50 transition-all duration-200">
                                Confirm
                              </button>
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Alt. Phone</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="secondary_phone" />
                        </div>
                        <div class="sm:col-span-2">
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Address</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="address" />
                        </div>
                    </div>
                </ng-container>

                <ng-container *ngIf="s.key === 'family'">
                    <div>
                        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-3">Family Group</label>
                        <div formArrayName="family_members" class="space-y-4">
                            <div *ngFor="let fg of familyMembers.controls; let idx = index" [formGroupName]="idx"
                                class="p-4 rounded-xl bg-white/60 dark:bg-gray-800/60 border border-gray-200/50 dark:border-gray-700/40">
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                                    <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="first_name" placeholder="First Name" />
                                    <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="last_name" placeholder="Last Name" />
                                    <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="dni" placeholder="Doc Number" />
                                    <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="relation" placeholder="Relationship" />
                                </div>
                                <button type="button" class="mt-2 text-red-500 hover:text-red-600 text-xs font-semibold transition-colors" (click)="removeFamilyMember(idx)">
                                    ✕ Remove member
                                </button>
                            </div>
                        </div>
                        <button type="button"
                                class="mt-3 inline-flex items-center gap-1.5 text-blue-600 dark:text-blue-400 hover:text-blue-700 dark:hover:text-blue-300 text-sm font-semibold transition-colors"
                                (click)="addFamilyMember()">
                          + Add Member
                        </button>
                    </div>
                </ng-container>

                <ng-container *ngIf="s.key === 'other'">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Date</label>
                            <input type="date" class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 transition-all duration-200" formControlName="date" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Occupation</label>
                            <input class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="occupation" />
                        </div>
                        <div>
                            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">Salary</label>
                            <input type="number" class="w-full border border-gray-200/80 dark:border-gray-600/50 bg-white dark:bg-gray-700/40 dark:text-white text-sm py-2.5 px-3.5 rounded-xl focus:ring-2 focus:ring-blue-500/30 focus:border-blue-500 placeholder-gray-400 dark:placeholder-gray-500 transition-all duration-200" formControlName="salary" />
                        </div>
                    </div>
                </ng-container>

                <div class="pt-4 flex justify-end gap-3">
                    <button *ngIf="i < sections.length - 1" type="button"
                        class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white
                               bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700
                               shadow-md shadow-blue-500/20 hover:shadow-lg transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
                        (click)="next()" [disabled]="!isSectionValid(s.key)">
                        Next →
                    </button>
                    <button *ngIf="i === sections.length - 1" type="submit"
                        class="px-6 py-2.5 rounded-xl text-sm font-semibold text-white
                               bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700
                               shadow-md shadow-emerald-500/20 hover:shadow-lg transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed"
                        [disabled]="form.invalid">
                        {{ isEditMode ? '✓ Update' : '✓ Create' }}
                    </button>
                </div>
            </div>
        </div>
    </form>
</div>
