<div
    class="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50/30 to-indigo-50 dark:from-gray-900 dark:via-gray-900 dark:to-gray-900 flex items-center justify-center p-4">
    <div class="fixed inset-0 pointer-events-none"
        style="background: radial-gradient(ellipse at 50% 50%, rgba(59,130,246,0.1), transparent 60%)"></div>

    <div class="relative max-w-2xl w-full text-center">
        <!-- Icon Container -->
        <div class="mb-8 flex justify-center">
            <div class="relative w-32 h-32 flex items-center justify-center">
                <div class="absolute inset-0 bg-blue-500/10 dark:bg-blue-500/20 rounded-full blur-2xl animate-pulse">
                </div>
                <div
                    class="relative bg-white dark:bg-gray-800 p-6 rounded-3xl shadow-xl border border-gray-100 dark:border-gray-700 transform hover:scale-105 transition-transform duration-300">
                    <svg class="w-16 h-16 text-blue-600 dark:text-blue-400" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Text Content -->
        <h1
            class="text-6xl sm:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 dark:from-blue-400 dark:to-indigo-400 mb-4 tracking-tight">
            404
        </h1>
        <h2 class="text-2xl sm:text-3xl font-bold text-gray-900 dark:text-white mb-6">
            ¡Oops! Página no encontrada
        </h2>
        <p class="text-gray-500 dark:text-gray-400 text-lg sm:text-xl mb-10 max-w-lg mx-auto">
            La página que estás buscando podría haber sido eliminada, haber cambiado de nombre, o estar temporalmente no
            disponible.
        </p>

        <!-- Actions -->
        <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
            <button (click)="goHome()"
                class="w-full sm:w-auto px-8 py-3.5 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-xl font-medium shadow-lg shadow-blue-500/30 flex items-center justify-center gap-2 transition-all transform hover:-translate-y-0.5">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0h4" />
                </svg>
                Volver al Inicio
            </button>

            <button (click)="goBack()"
                class="w-full sm:w-auto px-8 py-3.5 bg-white dark:bg-gray-800 text-gray-700 dark:text-gray-200 border border-gray-200 dark:border-gray-700 hover:bg-gray-50 dark:hover:bg-gray-700 rounded-xl font-medium shadow-sm flex items-center justify-center gap-2 transition-all">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                Página Anterior
            </button>
        </div>
    </div>
</div>
