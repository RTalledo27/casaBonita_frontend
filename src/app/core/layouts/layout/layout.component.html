<div class="flex h-screen bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-white select-none overflow-hidden">

    <!-- ── Mobile backdrop overlay ── -->
    <div *ngIf="sidebarService.isMobileOpen()"
        class="fixed inset-0 bg-black/50 backdrop-blur-sm z-40 lg:hidden transition-opacity duration-300"
        (click)="sidebarService.closeMobile()"></div>

    <!-- ── Sidebar ── -->
    <!-- Desktop: always visible, fixed width -->
    <!-- Mobile: hidden by default, slides in as overlay -->
    <app-sidebar
        class="flex-shrink-0 w-64 bg-white dark:bg-gradient-to-b dark:from-gray-950 dark:to-gray-800 border-r border-gray-200 dark:border-gray-700
               fixed inset-y-0 left-0 z-50 transition-transform duration-300 ease-in-out
               lg:relative lg:translate-x-0"
        [class.-translate-x-full]="!sidebarService.isMobileOpen()"
        [class.translate-x-0]="sidebarService.isMobileOpen()">
    </app-sidebar>

    <!-- ── Main content area ── -->
    <div class="flex-1 flex flex-col min-w-0 w-full">

        <!-- Topbar -->
        <header
            class="flex-shrink-0 bg-gradient-to-r from-indigo-300 to-blue-400 dark:from-indigo-950/80 dark:via-violet-900/80 dark:to-sky-900/80 px-3 sm:px-6 py-3 sm:py-4 shadow">
            <app-navbar></app-navbar>
        </header>

        <!-- Routed content -->
        <main class="flex-1 overflow-auto bg-gray-50 dark:bg-gray-900 min-w-0">
            <router-outlet></router-outlet>
        </main>
    </div>

    <!-- Toast Notifications -->
    <app-toast-notifications></app-toast-notifications>
</div>
